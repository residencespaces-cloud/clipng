services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clipng
      POSTGRES_PASSWORD: clipng
      POSTGRES_DB: clipng
    ports:
      - "5432:5432"
    volumes:
      - clipng_pg_data:/var/lib/postgresql/data

volumes:
  clipng_pg_data:
